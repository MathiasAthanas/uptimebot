<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UptimeBot — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #04090f;
      --card: #0b1628;
      --border: #162338;
      --border2: #1e3a5f;
      --text: #e2e8f0;
      --text2: #a0b4c8;
      --text3: #4a6380;
      --blue: #3b82f6;
      --blue-hover: #2563eb;
      --green: #10b981;
      --red: #f43f5e;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-glow {
      position: fixed; z-index: 0;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%);
      top: -200px; left: 50%; transform: translateX(-50%);
      pointer-events: none;
    }
    .bg-glow-2 {
      position: fixed; z-index: 0;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16,185,129,0.04) 0%, transparent 70%);
      bottom: -150px; right: 10%;
      pointer-events: none;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 20px;
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .brand-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(16,185,129,0.1));
      border: 1px solid rgba(59,130,246,0.3);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 24px; height: 24px; color: var(--blue); }
    .brand-name { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    .brand-name span { color: var(--blue); }
    .brand-sub {
      font-size: 13px; color: var(--text3); letter-spacing: 0.3px;
    }

    /* Card */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.05);
    }

    .card-title {
      font-size: 18px; font-weight: 700; color: var(--text);
      margin-bottom: 4px;
    }
    .card-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600; color: var(--text2);
      letter-spacing: 0.3px; margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
      display: flex; align-items: center;
    }
    .input-icon {
      position: absolute; left: 14px;
      color: var(--text3);
      pointer-events: none;
      width: 16px; height: 16px;
    }
    .form-input {
      width: 100%;
      background: #060e1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px 11px 40px;
      font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .form-input::placeholder { color: var(--text3); }
    .form-input.mono { font-family: 'JetBrains Mono', monospace; }

    /* Toggle password visibility */
    .eye-btn {
      position: absolute; right: 12px;
      background: none; border: none; cursor: pointer;
      color: var(--text3); padding: 4px;
      display: flex; align-items: center;
      transition: color 0.15s;
    }
    .eye-btn:hover { color: var(--text2); }
    .eye-btn svg { width: 16px; height: 16px; }

    /* Error */
    .error-banner {
      display: none;
      background: rgba(244,63,94,0.08);
      border: 1px solid rgba(244,63,94,0.25);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px; color: #f87171;
      margin-bottom: 18px;
      align-items: center; gap: 8px;
    }
    .error-banner.show { display: flex; }
    .error-banner svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Submit */
    .submit-btn {
      width: 100%;
      background: var(--blue);
      border: none; border-radius: 10px;
      padding: 13px 20px;
      font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif;
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .submit-btn:hover:not(:disabled) { background: var(--blue-hover); }
    .submit-btn:active:not(:disabled) { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .submit-btn svg { width: 16px; height: 16px; }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* System status strip */
    .status-strip {
      display: flex; align-items: center; justify-content: center;
      gap: 20px;
      margin-top: 28px;
    }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text3);
    }
    .status-dot-live {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 2px rgba(16,185,129,0.2);
      animation: pulse-green 2s ease-in-out infinite;
    }
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
      50% { box-shadow: 0 0 0 5px rgba(16,185,129,0.05); }
    }

    /* Version tag */
    .version-tag {
      text-align: center;
      margin-top: 20px;
      font-size: 11px; color: var(--text3);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="login-wrap">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <span class="brand-name">Uptime<span>Bot</span></span>
      </div>
      <p class="brand-sub">Incident Response &amp; Infrastructure Monitoring</p>
    </div>

    <!-- Card -->
    <div class="login-card">
      <div class="card-title">Sign in to your account</div>
      <div class="card-sub">Enter your credentials to access the dashboard</div>

      <div class="error-banner" id="errorBanner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorMsg">Invalid credentials. Please try again.</span>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="username" class="form-input" placeholder="admin" autocomplete="username" required />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" class="form-input mono" placeholder="••••••••••••" autocomplete="current-password" required />
            <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password visibility">
              <svg id="eyeIconShow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eyeIconHide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign in
        </button>
      </form>
    </div>

    <!-- System live indicator -->
    <div class="status-strip">
      <div class="status-pill">
        <div class="status-dot-live"></div>
        <span id="systemStatusLabel">Checking system...</span>
      </div>
    </div>

    <div class="version-tag">UptimeBot v1.0 &nbsp;·&nbsp; NexorDigital</div>
  </div>

  <script>
    // Check if already logged in
    const existing = localStorage.getItem('uptimebot_token');
    if (existing) {
      fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + existing } })
        .then(r => { if (r.ok) window.location.replace('/'); })
        .catch(() => {});
    }

    // System status
    fetch('/api/monitors/summary')
      .then(r => r.json())
      .then(data => {
        const total = data.length;
        const up = data.filter(m => m.status === 'up').length;
        document.getElementById('systemStatusLabel').textContent =
          `System monitoring ${total} endpoints — ${up}/${total} online`;
      })
      .catch(() => {
        document.getElementById('systemStatusLabel').textContent = 'Monitoring system online';
      });

    // Password toggle
    document.getElementById('eyeBtn').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const isText = pw.type === 'text';
      pw.type = isText ? 'password' : 'text';
      document.getElementById('eyeIconShow').style.display = isText ? '' : 'none';
      document.getElementById('eyeIconHide').style.display = isText ? 'none' : '';
    });

    // Login submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errBanner = document.getElementById('errorBanner');
      errBanner.classList.remove('show');

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Authenticating...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('uptimebot_token', data.token);
          localStorage.setItem('uptimebot_user', data.username);
          window.location.replace('/');
        } else {
          const err = await res.json().catch(() => ({ message: 'Invalid credentials' }));
          document.getElementById('errorMsg').textContent = err.message || 'Invalid credentials. Please try again.';
          errBanner.classList.add('show');
          btn.disabled = false;
          btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign in`;
        }
      } catch {
        document.getElementById('errorMsg').textContent = 'Network error. Please check your connection.';
        errBanner.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign in`;
      }
    });
  </script>
</body>
</html>
